services:
  # Database
  postgres:
    image: postgres:18
    container_name: job_board_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: job_board
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_board"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: job_board_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: job_board_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/job_board
      - PORT=3000
      - LOG_LEVEL=info
      - JWT_SECRET=your-super-secret-jwt-key-at-least-32-characters-long
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./server/logs:/app/logs
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: job_board_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - app

  # Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: job_board_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - app
    restart: unless-stopped

  # Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: job_board_grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - app
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: job_board_loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app
    restart: unless-stopped

  # Log Collection
  promtail:
    image: grafana/promtail:latest
    container_name: job_board_promtail
    volumes:
      - ./server/logs:/var/log/app:ro
      - ./observability/promtail.yml:/etc/promtail/promtail.yml:ro
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - app
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  app:
    name: job_board
    driver: bridge
