services:
  # Database
  postgres:
    image: postgres:18
    container_name: job_board_db_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: job_board
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_board"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev

  # Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: job_board_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dev

  # S3 Compatible Object Storage (LocalStack)
  localstack:
    image: localstack/localstack:latest
    container_name: job_board_localstack_dev
    restart: unless-stopped
    ports:
      - "4566:4566"  # LocalStack gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=s3
      - DEBUG=1
      - PERSISTENCE=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - localstack_dev_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dev

  # Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: job_board_prometheus_dev
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_dev_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - dev
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: job_board_grafana_dev
    ports:
      - "3002:3000"  # Changed to 3002 to avoid conflict with server
    volumes:
      - grafana_dev_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - dev
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: job_board_loki_dev
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki.yml:/etc/loki/local-config.yaml
      - loki_dev_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - dev
    restart: unless-stopped

  # Log Collection
  promtail:
    image: grafana/promtail:latest
    container_name: job_board_promtail_dev
    volumes:
      - ./server/logs:/var/log/app:ro
      - ./observability/promtail.yml:/etc/promtail/promtail.yml:ro
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - dev
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data:
  localstack_dev_data:
  prometheus_dev_data:
  grafana_dev_data:
  loki_dev_data:

networks:
  dev:
    name: job_board_dev
    driver: bridge
